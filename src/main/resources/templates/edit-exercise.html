<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Exercise</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .box-section { background: #fff; border: 2px solid #333; padding: 30px; max-width: 600px; margin: 0 auto; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #aaa; box-sizing: border-box; }
        .btn-black { background: #333; color: white; border: none; padding: 15px 20px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase;}
    </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar}"></div>
<div class="main-content">
    <div class="box-section">
        <h2 style="text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">Edit Exercise</h2>

        <form th:action="@{/exercises/edit/{id}(id=${exercise.id})}" method="post">
            <label>Exercise name:</label>
            <input type="text" name="name" th:value="${exercise.name}" required>

            <label>Short description:</label>
            <input type="text" name="description" th:value="${exercise.description}" required>

            <label>Type (e.g., Strength, Cardio, Interval):</label>
            <label>Type (Select from list):</label>
            <select name="valueTypes" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #aaa; box-sizing: border-box;">
                <option value="Ciężar + Powtórzenia" th:selected="${exercise.valueTypes == 'Ciężar + Powtórzenia'}">Weight + Reps</option>
                <option value="Tylko Powtórzenia" th:selected="${exercise.valueTypes == 'Tylko Powtórzenia'}">Reps Only</option>
                <option value="Czas + Powtórzenia" th:selected="${exercise.valueTypes == 'Czas + Powtórzenia'}">Time + Reps</option>
                <option value="Dystans + Czas" th:selected="${exercise.valueTypes == 'Dystans + Czas'}">Distance + Time</option>
                <option value="Tylko Czas" th:selected="${exercise.valueTypes == 'Tylko Czas'}">Time Only</option>
            </select>

            <button type="submit" class="btn-black">SAVE CHANGES</button>
        </form>
        <a th:href="@{/exercises}" style="display: block; text-align: center; margin-top: 15px; color: #555; text-decoration: none; font-weight: bold;">Cancel and return</a>
    </div>
</div>
</body>
</html>
