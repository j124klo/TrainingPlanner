<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Katalog Ćwiczeń</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .box-section { background: #fff; border: 2px solid #333; padding: 20px; margin-bottom: 25px; }
        .table-data { width: 100%; border-collapse: collapse; text-align: left; }
        .table-data th, .table-data td { border-bottom: 1px solid #ccc; padding: 10px; }
        .table-data th { background: #e9ecef; border: 1px solid #aaa; text-transform: uppercase; }
        .btn-black { background: #333; color: white; border: none; padding: 8px 12px; cursor: pointer; text-transform: uppercase; font-weight: bold; text-decoration: none; display: inline-block; font-size: 0.85em;}
        .btn-black:hover { background: #555; }
        .flex-form { display: flex; gap: 10px; align-items: center; }
        .flex-form input, .flex-form select { padding: 10px; border: 1px solid #aaa; flex: 1; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar}"></div>
<div class="main-content">
    <h2 style="text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">All Exercises</h2>

    <div class="box-section">
        <h3 style="margin-top:0;">Dodaj nowe ćwiczenie</h3>
        <form th:action="@{/exercises/add}" th:object="${newExercise}" method="post" class="flex-form">
            <input type="text" th:field="*{name}" placeholder="Nazwa ćwiczenia" required>
            <input type="text" th:field="*{description}" placeholder="Krótki opis" required>
            <select th:field="*{valueTypes}" required>
                <option value="Ciężar + Powtórzenia">Ciężar + Powtórzenia</option>
                <option value="Tylko Powtórzenia">Tylko Powtórzenia</option>
                <option value="Czas + Powtórzenia">Czas + Powtórzenia</option>
                <option value="Dystans + Czas">Dystans + Czas</option>
                <option value="Tylko Czas">Tylko Czas</option>
            </select>
            <button type="submit" class="btn-black">DODAJ</button>
        </form>
    </div>

    <div class="box-section">
        <table class="table-data">
            <thead>
            <tr><th>Nazwa</th><th>Opis</th><th>Typ</th><th>Akcje</th></tr>
            </thead>
            <tbody>
            <tr th:each="exercise : ${exercisesList}">
                <td th:text="${exercise.name}"></td>
                <td th:text="${exercise.description}"></td>
                <td th:text="${exercise.valueTypes}"></td>
                <td style="display: flex; gap: 5px; flex-wrap: wrap;">
                    <form th:action="@{/exercises/clone/{id}(id=${exercise.id})}" method="post" style="margin: 0;">
                        <button type="submit" class="btn-black">KLONUJ</button>
                    </form>
                    <a th:if="${#lists.contains(editableIds, exercise.id)}" th:href="@{/exercises/edit/{id}(id=${exercise.id})}" class="btn-black">EDYTUJ</a>
                    <a th:if="${isCoachOrAdmin and #lists.contains(editableIds, exercise.id)}" th:href="@{/exercises/{id}/share(id=${exercise.id})}" class="btn-black">WIDOCZNOŚĆ</a>
                    <form th:if="${#lists.contains(editableIds, exercise.id)}" th:action="@{/exercises/delete/{id}(id=${exercise.id})}" method="post" style="margin: 0;">
                        <button type="submit" class="btn-black" style="background: #dc3545;">USUŃ</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
