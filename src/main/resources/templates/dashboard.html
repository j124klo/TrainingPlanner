<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Strona Główna</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .dashboard-container { padding: 20px; }
        .box-section { background: #fff; border: 2px solid #333; padding: 20px; margin-bottom: 25px; }

        .week-table { width: 100%; border-collapse: collapse; text-align: center; }
        .week-table th { background: #e9ecef; border: 1px solid #aaa; padding: 10px; text-transform: uppercase; font-weight: bold; }
        .week-table td { border: 1px solid #aaa; padding: 15px 5px; vertical-align: top; height: 120px; }
        .rest-day { color: #888; margin-top: 10px; }

        .exercise-name { display: block; margin-bottom: 8px; font-size: 0.95em; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .exercise-name:last-child { border-bottom: none; }

        .pr-header { font-weight: bold; text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; margin-top: 0; }
        .pr-list { list-style: none; padding: 0; margin: 0; }
        .pr-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #ccc; }
        .pr-item:last-child { border-bottom: none; }
        .pr-name { font-weight: bold; }
        .pr-date { color: #777; font-size: 0.9em; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar}"></div>

<div class="main-content">
    <div class="dashboard-container">

        <div class="box-section">
            <div th:if="${activePlan == null}">
                <p style="text-align: center; font-size: 1.2em;">Nie masz aktywnego planu.</p>
                <div style="text-align: center;">
                    <a th:href="@{/plans}" style="background: #333; color: white; padding: 10px 20px; text-decoration: none; font-weight: bold;">WYBIERZ PLAN</a>
                </div>
            </div>

            <div th:if="${activePlan != null}">
                <table class="week-table">
                    <thead>
                    <tr>
                        <th>Pon</th><th>Wt</th><th>Śr</th><th>Czw</th><th>Pt</th><th>Sob</th><th>Nd</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td th:each="day : ${#numbers.sequence(1, 7)}">
                            <div th:if="${weeklyPlan.get(day).isEmpty()}" class="rest-day">Rest</div>

                            <div th:if="${!weeklyPlan.get(day).isEmpty()}">
                                        <span th:each="entry : ${weeklyPlan.get(day)}"
                                              th:text="${entry.exercise.name}"
                                              class="exercise-name"></span>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="box-section">
            <h3 class="pr-header">Recent Personal Records</h3>
            <ul class="pr-list">
                <li th:each="log : ${recentLogs}" class="pr-item">
                        <span class="pr-name">
                            <strong th:text="${log.exercise.name}"></strong> -

                            <span th:if="${log.weight != null and log.weight > 0}" th:text="${log.weight} + ' kg '"></span>
                            <span th:if="${log.reps != null and log.reps > 0}" th:text="'(x' + ${log.reps} + ') '"></span>
                            <span th:if="${log.distance != null and log.distance > 0}" th:text="${log.distance} + ' km '"></span>
                            <span th:if="${log.timeMinutes != null and log.timeMinutes > 0}" th:text="${log.timeMinutes} + ' min'"></span>
                        </span>
                    <span class="pr-date" th:text="${log.date}">Today</span>
                </li>
                <li th:if="${#lists.isEmpty(recentLogs)}" class="pr-item" style="color: #888;">
                    Brak zapisanych treningów. Czas ruszyć na siłownię! 💪
                </li>
            </ul>
        </div>

    </div>
</div>
</body>
</html>
