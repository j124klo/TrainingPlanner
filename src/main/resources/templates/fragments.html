<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:fragment="common-css">
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Styl paska bocznego z prototypu */
        .sidebar {
            width: 250px;
            background-color: #e0e0e0; /* Jasnoszary */
            border-right: 2px solid #333;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Przyciski w menu bocznym */
        .nav-btn {
            display: block;
            background-color: #ccc;
            color: black;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #333;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .nav-btn:hover { background-color: #bbb; }

        /* Zepchnięcie przycisku Logout na sam dół */
        .spacer { flex-grow: 1; }

        /* Kontener na główną treść po prawej stronie */
        .main-content {
            margin-left: 250px;
            padding: 30px;
            min-height: 100vh;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div th:fragment="sidebar" class="sidebar">
    <a th:href="@{/dashboard}" class="nav-btn">HOME</a>
    <a th:href="@{/plans}" class="nav-btn">PLAN</a>

    <a th:href="@{/workout/start}" class="nav-btn">START WORKOUT</a>

    <a th:href="@{/calculator}" class="nav-btn">1RM CALCULATOR</a>

    <a th:href="@{#}" class="nav-btn">STOPWATCH</a>
    <a th:href="@{/exercises}" class="nav-btn">ALL EXERCISES</a>
    <a th:href="@{/profile}" class="nav-btn">PERSONAL RECORDS</a>

    <div class="spacer"></div>
    <a th:href="@{/logout}" class="nav-btn">LOGOUT</a>
</div>

</body>
</html>
