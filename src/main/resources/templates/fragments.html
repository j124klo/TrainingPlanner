<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style th:fragment="common-css">
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Styl paska bocznego z prototypu */
        .sidebar {
            width: 250px;
            background-color: #e0e0e0; /* Jasnoszary */
            border-right: 2px solid #333;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Przyciski w menu bocznym */
        .nav-btn {
            display: block;
            background-color: #ccc;
            color: black;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #333;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .nav-btn:hover { background-color: #bbb; }

        /* Zepchnięcie przycisku Logout na sam dół */
        .spacer { flex-grow: 1; }

        /* Kontener na główną treść po prawej stronie */
        .main-content {
            margin-left: 250px;
            padding: 30px;
            min-height: 100vh;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div th:fragment="sidebar" class="sidebar">
    <div style="background: #ccc; padding: 10px; margin-bottom: 20px; text-align: center; border: 2px solid #333;">
        <small style="text-transform: uppercase;">Logged in as:</small><br>
        <strong th:if="${user != null}" th:text="${user.login}" style="font-size: 1.2em; color: #007bff;"></strong>
        <span th:if="${user != null}" th:text="'(' + ${user.role} + ')'" style="display:block; font-size: 0.8em; color: #555;"></span>
        <strong th:if="${user == null}" style="font-size: 1.2em; color: #dc3545;">GUEST</strong>
    </div>

    <a th:if="${user != null}" th:href="@{/dashboard}" class="nav-btn">HOME</a>
    <a th:if="${user != null}" th:href="@{/plans}" class="nav-btn">TRAINING PLANS</a>
    <a th:if="${user != null}" th:href="@{/workout/start}" class="nav-btn">START WORKOUT</a>

    <a th:href="@{/calculator}" class="nav-btn">1RM CALCULATOR</a>
    <a th:href="@{/stopwatch}" class="nav-btn">STOPWATCH</a>
    <a th:href="@{/exercises}" class="nav-btn">ALL EXERCISES</a>

    <a th:if="${user != null}" th:href="@{/profile}" class="nav-btn">PROFILE & GOALS</a>
    <a th:if="${user != null}" th:href="@{/records}" class="nav-btn">PERSONAL RECORDS</a>
    <a th:if="${user != null}" th:href="@{/history}" class="nav-btn">FULL HISTORY</a>

    <a th:if="${user != null and (user.role.name() == 'COACH' or user.role.name() == 'ADMIN')}"
       th:href="@{/coach/clients}" class="nav-btn btn-coach">MY CLIENTS</a>

    <div class="spacer"></div>
    <a th:if="${user != null}" th:href="@{/logout}" class="nav-btn">LOGOUT</a>
    <a th:if="${user == null}" th:href="@{/login}" class="nav-btn" style="background: #28a745; color: white;">LOGIN</a>
</div>

</body>
</html>
