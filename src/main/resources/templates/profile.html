<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile & Goals</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .box-section { background: #fff; border: 2px solid #333; padding: 20px; margin-bottom: 25px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input[type="text"], input[type="number"], input[type="date"] { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #aaa; box-sizing: border-box; }
        .btn-black { background: #333; color: white; padding: 10px 15px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        .goal-item { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .achieved { background-color: #d4edda; text-decoration: line-through; color: #155724; }
        .table-data { width: 100%; border-collapse: collapse; text-align: left; }
        .table-data th, .table-data td { border-bottom: 1px solid #ccc; padding: 8px; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar}"></div>
<div class="main-content">
    <h2 style="text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">Profile & Goals</h2>
    <div th:if="${!#lists.isEmpty(invites)}" class="box-section" style="background: #fff3cd; border-color: #ffeeba;">
        <h3 style="color: #856404; margin-top:0;">You have received invitations from Coaches!</h3>
        <div th:each="inv : ${invites}" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:10px;">
            <span th:text="'Coach' + ${inv.coach.login} + ' wants to supervise you.'"></span>
            <form th:action="@{/profile/accept-coach/{id}(id=${inv.id})}" method="post" style="margin:0;">
                <button type="submit" class="btn-black" style="width:auto;">Accept</button>
            </form>
        </div>
    </div>
    <div class="grid-container">
        <div class="box-section">
            <h3>Body Measurements</h3>
            <form th:action="@{/profile/measurement}" method="post">
                <label>Weight (kg):</label>
                <input type="number" step="0.1" name="weight" required>
                <label>Body fat % (optional):</label>
                <input type="number" step="0.1" name="bodyFat">
                <button type="submit" class="btn-black">Save Measurement</button>
            </form>
            <hr>
            <table class="table-data">
                <tr><th>Date</th><th>Weight</th><th>Fat %</th></tr>
                <tr th:each="m : ${measurements}">
                    <td th:text="${m.date}"></td>
                    <td th:text="${m.weight} + ' kg'"></td>
                    <td th:text="${m.bodyFat != null ? m.bodyFat + '%' : '-'}"></td>
                </tr>
            </table>
        </div>

        <div class="box-section">
            <h3>Your Goals</h3>
            <form th:action="@{/profile/goal}" method="post">
                <label>Goal description:</label>
                <input type="text" name="description" placeholder="e.g. 100kg bench press" required>
                <label>Target date:</label>
                <input type="date" name="deadline" required>
                <button type="submit" class="btn-black">Add Goal</button>
            </form>
            <hr>
            <div th:each="goal : ${goals}" th:classappend="${goal.achieved} ? 'achieved' : ''" class="goal-item">
                <div>
                    <strong th:text="${goal.description}"></strong><br>
                    <small th:text="'Deadline: ' + ${goal.deadline}"></small>
                </div>
                <form th:action="@{/profile/goal/{id}/check(id=${goal.id})}" method="post" style="margin:0;">
                    <button type="submit" style="background: none; border: 1px solid #333; padding: 5px; cursor: pointer;">
                        <span th:text="${goal.achieved} ? 'Undo' : 'Done'"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
