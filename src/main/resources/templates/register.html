<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration - TrainingPlanner</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .error { color: red; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registration</h2>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form th:action="@{/register}" th:object="${newUser}" method="post">
        <input type="text" th:field="*{login}" placeholder="Login" required
               pattern="^[a-zA-Z0-9_]{3,20}$"
               title="Login must be 3-20 characters long and contain only letters, numbers, or underscores.">

        <div style="font-size: 11px; color: #777; text-align: left; margin: -5px 0 10px 5%;">
            * 3-20 characters (letters, numbers, underscores only).
        </div>

        <input type="password" th:field="*{password}" placeholder="Password" required>

        <div style="text-align: left; margin: 15px 0; margin-left: 5%;">
            <input type="checkbox" id="coachCheckbox" name="isCoach" style="width: auto;" onchange="toggleCoachPassword()">
            <label for="coachCheckbox">I am registering as a Coach</label>
        </div>

        <div id="coachPasswordDiv" style="display: none;">
            <input type="password" name="coachPassword" placeholder="Verification password (trener123)">
        </div>

        <button type="submit">Sign up</button>
    </form>

    <p style="font-size: 14px; margin-top: 15px;">Already have an account? <a th:href="@{/login}">Login</a></p>
</div>

<script>
    function toggleCoachPassword() {
        var checkBox = document.getElementById("coachCheckbox");
        var passwordDiv = document.getElementById("coachPasswordDiv");
        if (checkBox.checked == true) {
            passwordDiv.style.display = "block";
        } else {
            passwordDiv.style.display = "none";
        }
    }
</script>

</body>
</html>
