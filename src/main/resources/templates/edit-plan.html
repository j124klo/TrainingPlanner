<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Plan</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .box-section { background: #fff; border: 2px solid #333; padding: 30px; max-width: 600px; margin: 0 auto; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #aaa; box-sizing: border-box; }
        .btn-black { background: #333; color: white; border: none; padding: 15px 20px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase;}
    </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar}"></div>
<div class="main-content">
    <div class="box-section">
        <h2 style="text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">Edit Plan</h2>
        <form th:action="@{/plans/edit/{id}(id=${plan.id})}" method="post">
            <label>Plane name:</label>
            <input type="text" name="name" th:value="${plan.name}" required>
            <label>Short description:</label>
            <input type="text" name="description" th:value="${plan.description}" required>
            <button type="submit" class="btn-black">SAVE CHANGES</button>
        </form>
        <a th:href="@{/plans}" style="display: block; text-align: center; margin-top: 15px; color: #555; text-decoration: none; font-weight: bold;">Cancel and return</a>
    </div>
</div>
</body>
</html>
