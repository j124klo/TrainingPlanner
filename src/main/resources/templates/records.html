<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Personal Records</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .box-section { background: #fff; border: 2px solid #333; padding: 20px; margin-bottom: 25px; }
        .cat-title { text-transform: uppercase; color: #333; border-bottom: 2px solid #aaa; padding-bottom: 5px; margin-top: 0; }
        .record-table { width: 100%; border-collapse: collapse; text-align: left; }
        .record-table th, .record-table td { border-bottom: 1px solid #eee; padding: 10px; }
        .record-table th { color: #666; font-size: 0.8em; text-transform: uppercase; }
        .val-highlight { font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar}"></div>
<div class="main-content">
    <h2 style="text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">Personal Records (PR)</h2>

    <div class="box-section" th:if="${!#maps.isEmpty(maxStrength)}">
        <h3 class="cat-title">Max Strength</h3>
        <table class="record-table">
            <tr><th>Exercise</th><th>Weight (kg)</th><th>Reps</th><th>Date</th></tr>
            <tr th:each="entry : ${maxStrength}">
                <td style="font-weight: bold;" th:text="${entry.key.name}"></td>
                <td class="val-highlight" th:text="${entry.value.weight}"></td>
                <td th:text="${entry.value.reps}"></td>
                <td style="color:#888;" th:text="${entry.value.date}"></td>
            </tr>
        </table>
    </div>

    <div class="box-section" th:if="${!#maps.isEmpty(maxEndurance)}">
        <h3 class="cat-title">Max Endurance</h3>
        <table class="record-table">
            <tr><th>Exercise</th><th>Max Reps</th><th>Load</th><th>Date</th></tr>
            <tr th:each="entry : ${maxEndurance}">
                <td style="font-weight: bold;" th:text="${entry.key.name}"></td>
                <td class="val-highlight" th:text="${entry.value.reps}"></td>
                <td>
                    <span th:if="${entry.value.weight != null and entry.value.weight > 0}" th:text="${entry.value.weight} + ' kg'"></span>
                    <span th:if="${entry.value.weight == null or entry.value.weight == 0}" style="color: #aaa;">Bodyweight</span>
                </td>
                <td style="color:#888;" th:text="${entry.value.date}"></td>
            </tr>
        </table>
    </div>

    <div class="box-section" th:if="${!#maps.isEmpty(maxTime)}">
        <h3 class="cat-title">Max Time</h3>
        <table class="record-table">
            <tr><th>Exercise</th><th>Time (min)</th><th>Date</th></tr>
            <tr th:each="entry : ${maxTime}">
                <td style="font-weight: bold;" th:text="${entry.key.name}"></td>
                <td class="val-highlight" th:text="${entry.value.timeMinutes}"></td>
                <td style="color:#888;" th:text="${entry.value.date}"></td>
            </tr>
        </table>
    </div>

    <div class="box-section" th:if="${!#maps.isEmpty(maxDistance)}">
        <h3 class="cat-title">Max Distance</h3>
        <table class="record-table">
            <tr><th>Exercise</th><th>Dist (km)</th><th>Date</th></tr>
            <tr th:each="entry : ${maxDistance}">
                <td style="font-weight: bold;" th:text="${entry.key.name}"></td>
                <td class="val-highlight" th:text="${entry.value.distance}"></td>
                <td style="color:#888;" th:text="${entry.value.date}"></td>
            </tr>
        </table>
    </div>

</div>
</body>
</html>
