<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pełna Historia</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .box-section { background: #fff; border: 2px solid #333; padding: 20px; margin-bottom: 25px; }
        .log-table { width: 100%; border-collapse: collapse; text-align: left; }
        .log-table th, .log-table td { border-bottom: 1px solid #ccc; padding: 8px; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar}"></div>
<div class="main-content">
    <h2 style="text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">Dziennik Treningów</h2>

    <div th:each="day : ${history}" class="box-section">
        <h3 th:text="${day.key}" style="background: #333; color: white; display: inline-block; padding: 5px 15px; margin-top:0;"></h3>
        <table class="log-table">
            <tr><th>Ćwiczenie</th><th>Seria</th><th>Szczegóły</th></tr>
            <tr th:each="log : ${day.value}">
                <td style="font-weight: bold;" th:text="${log.exercise.name}"></td>
                <td th:text="${log.setNumber}"></td>
                <td>
                    <span th:if="${log.weight != null}" th:text="${log.weight} + 'kg '"></span>
                    <span th:if="${log.reps != null}" th:text="'x ' + ${log.reps} + ' powt. '"></span>
                    <span th:if="${log.distance != null}" th:text="${log.distance} + 'km '"></span>
                    <span th:if="${log.timeMinutes != null}" th:text="${log.timeMinutes} + 'min '"></span>
                </td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
