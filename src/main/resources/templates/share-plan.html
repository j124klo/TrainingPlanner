<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Share Plan</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .btn-save { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; width: 100%; margin-top: 15px;}
        .warning-box { background: #ffeeba; color: #856404; padding: 15px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #ffe8a1; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div th:replace="~{fragments :: sidebar}"></div>

<div class="main-content">
    <div class="container">
        <h2>Sharing a plan: <span th:text="${plan.name}"></span></h2>

        <div th:if="${warning}" class="warning-box">
            <p th:text="${warning}"></p>
        </div>

        <form th:action="@{/plans/{id}/share(id=${plan.id})}" method="post">

            <label>Visibility status:</label>
            <select name="isPublic">
                <option value="false" th:selected="${!plan.isPublic}">Private (Only me)</option>
                <option value="true" th:selected="${plan.isPublic}">Public (Everyone)</option>
            </select>

            <div th:if="${warning}" style="margin-top: 20px; border: 1px solid red; padding: 10px; border-radius: 4px;">
                <input type="checkbox" id="forceShare" name="forceShareExercises" value="true" required>
                <label for="forceShare" style="display: inline; color: red;">I agree to change the visibility of related exercises to Public</label>
            </div>

            <button type="submit" class="btn-save">Save settings</button>
        </form>

        <a th:href="@{/plans}" style="display: block; text-align: center; margin-top: 15px; color: #6c757d;">Cancel and return</a>
    </div>
</div>

</body>
</html>
