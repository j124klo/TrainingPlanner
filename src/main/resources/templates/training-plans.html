<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Moje Plany</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .box-section { background: #fff; border: 2px solid #333; padding: 20px; margin-bottom: 25px; }
        .table-data { width: 100%; border-collapse: collapse; text-align: left; }
        .table-data th, .table-data td { border-bottom: 1px solid #ccc; padding: 10px; }
        .table-data th { background: #e9ecef; border: 1px solid #aaa; text-transform: uppercase; }
        .btn-black { background: #333; color: white; border: none; padding: 8px 12px; cursor: pointer; text-transform: uppercase; font-weight: bold; text-decoration: none; display: inline-block; font-size: 0.85em;}
        .btn-black:hover { background: #555; }
        .btn-active { background: #ffc107; color: black; }
        .flex-form { display: flex; gap: 10px; align-items: center; }
        .flex-form input { padding: 10px; border: 1px solid #aaa; flex: 1; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar}"></div>
<div class="main-content">
    <h2 style="text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">Training Plans</h2>

    <div class="box-section">
        <h3 style="margin-top:0;">Stwórz nowy plan</h3>
        <form th:action="@{/plans/add}" th:object="${newPlan}" method="post" class="flex-form">
            <input type="text" th:field="*{name}" placeholder="Nazwa planu (np. Push Pull Legs)" required>
            <input type="text" th:field="*{description}" placeholder="Krótki opis" required>
            <button type="submit" class="btn-black">DODAJ</button>
        </form>
    </div>

    <div class="box-section">
        <table class="table-data">
            <thead>
            <tr><th>Nazwa</th><th>Opis</th><th>Status</th><th>Akcje</th></tr>
            </thead>
            <tbody>
            <tr th:each="plan : ${plansList}">
                <td style="font-weight: bold;" th:text="${plan.name}"></td>
                <td th:text="${plan.description}"></td>
                <td>
                    <form th:action="@{/plans/activate/{id}(id=${plan.id})}" method="post" style="margin: 0;">
                        <button type="submit" th:classappend="${user.currentPlanId == plan.id} ? 'btn-active' : ''" class="btn-black">
                            <span th:text="${user.currentPlanId == plan.id} ? '★ AKTYWNY' : 'AKTYWUJ'"></span>
                        </button>
                    </form>
                </td>
                <td style="display: flex; gap: 5px;">
                    <a th:href="@{/plans/{id}(id=${plan.id})}" class="btn-black">SZCZEGÓŁY</a>
                    <form th:action="@{/plans/clone/{id}(id=${plan.id})}" method="post" style="margin: 0;">
                        <button type="submit" class="btn-black">KLONUJ</button>
                    </form>
                    <a th:if="${isCoachOrAdmin and #lists.contains(editablePlanIds, plan.id)}" th:href="@{/plans/{id}/share(id=${plan.id})}" class="btn-black">WIDOCZNOŚĆ</a>
                    <form th:if="${#lists.contains(editablePlanIds, plan.id)}" th:action="@{/plans/delete/{id}(id=${plan.id})}" method="post" style="margin: 0;">
                        <button type="submit" class="btn-black" style="background: #dc3545;">USUŃ</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
