<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Active Workout</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .box-section { background: #fff; border: 2px solid #333; padding: 20px; margin-bottom: 20px; }
        .flex-row { display: flex; gap: 10px; align-items: flex-end; margin-top: 15px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 5px; text-transform: uppercase;}
        .input-group input, .input-group select { width: 100%; padding: 8px; border: 1px solid #aaa; box-sizing: border-box; }
        .btn-log { background: #333; color: white; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; height: 35px; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        .log-table th, .log-table td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; }
        .log-table th { color: #555; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar}"></div>
<div class="main-content">
    <h2 style="text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">Workout Session</h2>

    <div th:if="${#lists.isEmpty(sessionExercises)}" class="box-section">
        <p>You don't have anything planned for today, but you can add an exercise manually below!</p>
    </div>

    <div th:each="exercise : ${sessionExercises}" class="box-section">
        <h3 th:text="${exercise.name}" style="margin-top: 0; color: #007bff; border-bottom: 1px solid #eee; padding-bottom: 10px;"></h3>

        <table th:if="${logsByExercise.containsKey(exercise.id)}" class="log-table">
            <tr>
                <th>Set</th>
                <th th:if="${exercise.valueTypes == 'Weight + Reps'}">Weight (kg)</th>
                <th th:if="${exercise.valueTypes == 'Distance + Time'}">Distance (km)</th>
                <th th:if="${exercise.valueTypes == 'Distance + Time' or exercise.valueTypes == 'Time + Reps' or exercise.valueTypes == 'Time Only'}">Time (min)</th>
                <th th:if="${exercise.valueTypes == 'Weight + Reps' or exercise.valueTypes == 'Reps Only' or exercise.valueTypes == 'Time + Reps'}">Reps</th>
                <th>✔</th>
            </tr>
            <tr th:each="log : ${logsByExercise.get(exercise.id)}">
                <td th:text="${log.setNumber}"></td>
                <td th:if="${exercise.valueTypes == 'Weight + Reps'}" th:text="${log.weight}"></td>
                <td th:if="${exercise.valueTypes == 'Distance + Time'}" th:text="${log.distance}"></td>
                <td th:if="${exercise.valueTypes == 'Distance + Time' or exercise.valueTypes == 'Time + Reps' or exercise.valueTypes == 'Time Only'}" th:text="${log.timeMinutes}"></td>
                <td th:if="${exercise.valueTypes == 'Weight + Reps' or exercise.valueTypes == 'Reps Only' or exercise.valueTypes == 'Time + Reps'}" th:text="${log.reps}"></td>
                <td style="color: green; font-weight:bold;">OK</td>
            </tr>
        </table>

        <form th:action="@{/workout/log}" method="post" class="flex-row">
            <input type="hidden" name="exerciseId" th:value="${exercise.id}">
            <div class="input-group" style="max-width: 80px;">
                <label>Set</label>
                <input type="number" name="setNumber" th:value="${logsByExercise.containsKey(exercise.id) ? logsByExercise.get(exercise.id).size() + 1 : 1}" required>
            </div>

            <div class="input-group" th:if="${exercise.valueTypes == 'Weight + Reps'}">
                <label>Weight (kg)</label>
                <input type="number" step="0.5" name="weight" required>
            </div>
            <div class="input-group" th:if="${exercise.valueTypes == 'Distance + Time'}">
                <label>Distance (km)</label>
                <input type="number" step="0.1" name="distance" required>
            </div>
            <div class="input-group" th:if="${exercise.valueTypes == 'Distance + Time' or exercise.valueTypes == 'Time + Reps' or exercise.valueTypes == 'Time Only'}">
                <label>Time (min)</label>
                <input type="number" name="timeMinutes" required>
            </div>
            <div class="input-group" th:if="${exercise.valueTypes == 'Weight + Reps' or exercise.valueTypes == 'Reps Only' or exercise.valueTypes == 'Time + Reps'}">
                <label>Reps</label>
                <input type="number" name="reps" required>
            </div>

            <button type="submit" class="btn-log">SAVE</button>
        </form>
    </div>

    <div class="box-section" style="background: #f9f9f9; border-style: dashed;">
        <h3 style="margin-top:0;">Do something extra (off-plan)</h3>
        <form th:action="@{/workout/log}" method="post" class="flex-row">
            <div class="input-group" style="flex: 2;">
                <label>Select exercise</label>
                <select name="exerciseId" id="extraSelect" onchange="updateExtraFields()" required>
                    <option value="" disabled selected data-type="">-- Select from catalog --</option>
                    <option th:each="ex : ${allExercises}" th:value="${ex.id}" th:text="${ex.name}" th:data-type="${ex.valueTypes}"></option>
                </select>
            </div>
            <input type="hidden" name="setNumber" value="1">

            <div class="input-group" id="fWeight" style="display:none;">
                <label>Weight (kg)</label>
                <input type="number" step="0.5" name="weight" id="iWeight">
            </div>
            <div class="input-group" id="fDist" style="display:none;">
                <label>Distance (km)</label>
                <input type="number" step="0.1" name="distance" id="iDist">
            </div>
            <div class="input-group" id="fTime" style="display:none;">
                <label>Time (min)</label>
                <input type="number" name="timeMinutes" id="iTime">
            </div>
            <div class="input-group" id="fReps" style="display:none;">
                <label>Reps</label>
                <input type="number" name="reps" id="iReps">
            </div>

            <button type="submit" class="btn-log">ADD</button>
        </form>
    </div>

    <a th:href="@{/dashboard}" style="display: block; text-align: center; margin-top: 20px; color: #333; font-weight: bold; text-decoration: none; padding: 10px; border: 2px solid #333; background: #e0e0e0;">FINISH WORKOUT</a>
</div>

<script>
    function updateExtraFields() {
        var select = document.getElementById("extraSelect");
        var type = select.options[select.selectedIndex].getAttribute("data-type");

        var fWeight = document.getElementById("fWeight"), iWeight = document.getElementById("iWeight");
        var fDist = document.getElementById("fDist"), iDist = document.getElementById("iDist");
        var fTime = document.getElementById("fTime"), iTime = document.getElementById("iTime");
        var fReps = document.getElementById("fReps"), iReps = document.getElementById("iReps");

        // Najpierw ukrywamy wszystkie pola i usuwamy z nich wymóg "required"
        fWeight.style.display = "none"; iWeight.required = false;
        fDist.style.display = "none"; iDist.required = false;
        fTime.style.display = "none"; iTime.required = false;
        fReps.style.display = "none"; iReps.required = false;

        // Jeśli nic nie wybrano, przerywamy
        if (!type) return;

        // Pokazujemy tylko te pola, których wymaga typ ćwiczenia i ustawiamy jako obowiązkowe
        if (type === 'Weight + Reps') {
            fWeight.style.display = "block"; iWeight.required = true;
            fReps.style.display = "block"; iReps.required = true;
        } else if (type === 'Reps Only') {
            fReps.style.display = "block"; iReps.required = true;
        } else if (type === 'Time + Reps') {
            fTime.style.display = "block"; iTime.required = true;
            fReps.style.display = "block"; iReps.required = true;
        } else if (type === 'Distance + Time') {
            fDist.style.display = "block"; iDist.required = true;
            fTime.style.display = "block"; iTime.required = true;
        } else if (type === 'Time Only') {
            fTime.style.display = "block"; iTime.required = true;
        }
    }
</script>
</body>
</html>
