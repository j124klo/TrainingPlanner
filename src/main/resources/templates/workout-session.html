<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Active Workout</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .box-section { background: #fff; border: 2px solid #333; padding: 20px; margin-bottom: 20px; }
        .flex-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 15px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #aaa; box-sizing: border-box; }
        .btn-log { background: #333; color: white; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; height: 35px; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar}"></div>
<div class="main-content">
    <h2 style="text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">Workout Session</h2>

    <div th:if="${#lists.isEmpty(todaysEntries)}" class="box-section">
        <p>Dzisiaj masz dzień wolny! Ciesz się regeneracją.</p>
    </div>

    <div th:each="entry : ${todaysEntries}" class="box-section">
        <h3 th:text="${entry.exercise.name}" style="margin-top: 0; color: #007bff;"></h3>

        <form th:action="@{/workout/log}" method="post" class="flex-row">
            <input type="hidden" name="exerciseId" th:value="${entry.exercise.id}">

            <div class="input-group">
                <label>Seria</label>
                <input type="number" name="setNumber" value="1" required>
            </div>
            <div class="input-group">
                <label>Ciężar (kg)</label>
                <input type="number" step="0.5" name="weight" required>
            </div>
            <div class="input-group">
                <label>Powtórzenia</label>
                <input type="number" name="reps" required>
            </div>
            <button type="submit" class="btn-log">ZAPISZ</button>
        </form>
    </div>

    <a th:href="@{/dashboard}" style="display: block; text-align: center; margin-top: 20px; color: #333; font-weight: bold;">ZAKOŃCZ TRENING</a>
</div>
</body>
</html>
