<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Client's Log</title>
    <style th:replace="~{fragments :: common-css}"></style>
    <style>
        .box-section { background: #fff; border: 2px solid #333; padding: 20px; margin-bottom: 25px; }
        .log-table { width: 100%; border-collapse: collapse; text-align: left; }
        .log-table th, .log-table td { border-bottom: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: sidebar}"></div>
<div class="main-content">
    <h2 style="text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">
        Workouts for client: <span th:text="${client.login}" style="color: #007bff;"></span>
    </h2>

    <div class="box-section">
        <a th:href="@{/coach/clients}" style="color: #333; text-decoration: none; font-weight: bold; margin-bottom: 20px; display: inline-block;">⬅ Back to client list</a>

        <table class="log-table">
            <tr><th>Date</th><th>Exercise</th><th>Set</th><th>Weight (kg)</th><th>Reps</th></tr>
            <tr th:each="log : ${logs}">
                <td th:text="${log.date}"></td>
                <td th:text="${log.exercise.name}"></td>
                <td th:text="${log.setNumber}"></td>
                <td th:text="${log.weight}"></td>
                <td th:text="${log.reps}"></td>
            </tr>
        </table>
        <p th:if="${#lists.isEmpty(logs)}" style="color: #888; text-align: center; margin-top: 20px;">This client hasn't logged any workouts yet.</p>
    </div>
</div>
</body>
</html>
