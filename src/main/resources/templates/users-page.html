<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users List</title>
</head>
<body>
<h1>Registered in TrainingPlanner</h1>

<ul>
    <li th:each="user : ${usersList}"
        th:text="${user.login} + ' (ID: ' + ${user.id} + ')'">
    </li>
</ul>
</body>
</html>
